server:
  port: 4004

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service-route
              uri: http://patient-service:4001
              predicates:
                - Path=/api/patients,/api/patients/**
              filters:
                - RewritePath=/api/patients(?<segment>/?.*), /patients${segment}

            - id: api-docs-patients-route
              uri: http://patient-service:4001
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients,/v3/api-docs
syntax = "proto3";

package patient.events;

option java_package = "com.pm.patientservice.kafka.events";
option java_outer_classname = "PatientEventProto";
option java_multiple_files = true;

message PatientEvent {
  string patient_id = 1;
  string name = 2;
  string email = 3;
  string event_type = 4;
}